<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="robots" content="noindex, nofollow">
<title>publish · Chocho</title>
<link rel="stylesheet" href="{{PREFIX}}style.css">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3E%3Ctext y='13' font-size='14'%3E%E2%9C%8E%3C/text%3E%3C/svg%3E">
<style>
  [hidden] { display: none !important; }
  body { display: block; max-width: 560px; margin: 0 auto; padding: 24px 18px 80px; }
  .ptabs { display: flex; gap: 6px; margin: 18px 0 24px; flex-wrap: wrap; }
  .ptabs button {
    background: none; border: 1px solid var(--hair); color: var(--ink);
    padding: 8px 18px; border-radius: 999px; cursor: pointer; font-family: inherit; font-size: .95rem;
  }
  .ptabs button.on { background: var(--ink); color: var(--paper); border-color: var(--ink); }
  .pform { display: none; }
  .pform.on { display: block; }
  label { display: block; font-size: .85rem; margin: 14px 0 4px; color: var(--dim); }
  input[type=text], textarea, select {
    width: 100%; padding: 10px; border: 1px solid var(--hair); background: var(--paper);
    color: var(--ink); font-family: inherit; font-size: 1rem;
  }
  textarea { min-height: 140px; }
  input[type=file] { margin-top: 4px; width: 100%; }
  .go {
    margin-top: 20px; width: 100%; padding: 13px; background: var(--ink); color: var(--paper);
    border: none; font-size: 1rem; font-weight: 700; cursor: pointer; font-family: inherit;
  }
  .go:disabled { opacity: .4; }
  #status { margin-top: 14px; font-size: .9rem; min-height: 1.4em; white-space: pre-line; }
  .cover-list { list-style: none; padding: 0; }
  .cover-list li {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 0; border-bottom: 1px solid var(--hair);
  }
  .cover-list .thumb {
    width: 44px; height: 44px; border: 1px solid var(--hair);
    display: flex; align-items: center; justify-content: center;
    color: var(--dim); font-size: 10px; flex-shrink: 0; overflow: hidden;
  }
  .cover-list .thumb img { width: 100%; height: 100%; object-fit: cover; }
  .cover-list .t { flex: 1; font-weight: 600; }
  .cover-list button {
    background: none; border: 1px solid var(--ink); color: var(--ink);
    padding: 4px 12px; border-radius: 999px; cursor: pointer; font-family: inherit; font-size: .8rem;
  }
  .cover-list button:hover { background: var(--ink); color: var(--paper); }
  .token-box { border: 1px solid var(--hair); padding: 14px; margin-bottom: 10px; }
  .token-box.ok { border-color: var(--ink); }
  .hint { font-size: .78rem; color: var(--dim); margin-top: 6px; line-height: 1.5; }
  .hint a { color: inherit; }
</style>
</head>
<body>
<h1 class="lang-en" style="font-family:var(--title-en)">Publish</h1>

<div class="token-box" id="tokenBox">
  <label for="tok">GitHub token (stored only on this device)</label>
  <input type="text" id="tok" placeholder="github_pat_..." autocomplete="off">
  <button class="go" id="saveTok" style="margin-top:10px">Save token</button>
  <p class="hint">Create one at github.com → Settings → Developer settings → Fine-grained tokens.
  Repository access: only <b>chocho-music</b>. Permissions: Contents → Read and write. Expiration: 1 year.</p>
</div>

<div class="ptabs" id="ptabs" hidden>
  <button data-t="beat" class="on">Beat</button>
  <button data-t="photo">Photo</button>
  <button data-t="note">Note</button>
  <button data-t="covers">Covers</button>
</div>

<form class="pform on" id="f-beat" hidden>
  <label>MP3 file</label><input type="file" id="beatFile" accept="audio/mpeg,audio/mp3">
  <label>Title</label><input type="text" id="beatTitle" placeholder="Beat name">
  <label>Cover image (optional, will be squared)</label><input type="file" id="beatCover" accept="image/*">
  <button type="button" class="go" id="goBeat">Publish beat</button>
</form>

<form class="pform" id="f-photo" hidden>
  <label>Photos (one or many)</label><input type="file" id="photoFiles" accept="image/*" multiple>
  <label>Tags (comma separated: NY, Food, Andy...)</label><input type="text" id="photoTags" placeholder="TLV, Skate">
  <label>Location (optional)</label><input type="text" id="photoLoc" placeholder="Tel Aviv">
  <button type="button" class="go" id="goPhoto">Publish photos</button>
</form>

<form class="pform" id="f-note" hidden>
  <label>Title</label><input type="text" id="noteTitle" dir="auto">
  <label>Language</label>
  <select id="noteLang"><option value="en">English</option><option value="he">עברית</option></select>
  <label>Text (markdown + [[wiki-links]] work)</label><textarea id="noteBody" dir="auto"></textarea>
  <label>Image (optional)</label><input type="file" id="noteImg" accept="image/*">
  <button type="button" class="go" id="goNote">Plant note</button>
</form>

<div class="pform" id="f-covers" hidden>
  <p class="hint">Tap a beat to give it a cover. Images are auto-squared. (Rotate / filters / text overlay - coming next.)</p>
  <ul class="cover-list" id="coverList"></ul>
  <input type="file" id="coverPick" accept="image/*" hidden>
</div>

<p id="status"></p>

<script>
(function(){
  var REPO='Chocho88/chocho-music', BRANCH='main', API='https://api.github.com/repos/'+REPO+'/contents/';
  var $=function(id){return document.getElementById(id);};
  var status=function(t){ $('status').textContent=t; };
  var TOKEN='';
  try{ TOKEN=localStorage.getItem('gardenToken')||''; }catch(e){}

  function ui(){
    var ok=!!TOKEN;
    $('tokenBox').classList.toggle('ok',ok);
    $('tok').placeholder = ok ? 'token saved ✓ (paste a new one to replace)' : 'github_pat_...';
    $('ptabs').hidden=!ok;
    $('f-beat').hidden=!ok;
    if(!ok){ ['f-photo','f-note','f-covers'].forEach(function(f){ $(f).hidden=true; }); }
  }
  $('saveTok').addEventListener('click',function(){
    var v=$('tok').value.trim();
    if(!v){ status('Paste a token first.'); return; }
    TOKEN=v; try{ localStorage.setItem('gardenToken',v); }catch(e){}
    $('tok').value=''; status('Token saved on this device.'); ui();
  });

  // tabs
  document.querySelectorAll('#ptabs button').forEach(function(b){
    b.addEventListener('click',function(){
      document.querySelectorAll('#ptabs button').forEach(function(x){x.classList.remove('on');});
      b.classList.add('on');
      ['beat','photo','note','covers'].forEach(function(t){
        var el=$('f-'+t); el.classList.toggle('on', t===b.dataset.t); el.hidden = t!==b.dataset.t;
      });
      if(b.dataset.t==='covers') loadCovers();
    });
  });

  /* ---- github api ---- */
  function gh(path, opts){
    opts=opts||{};
    opts.headers=Object.assign({
      'Authorization':'Bearer '+TOKEN,
      'Accept':'application/vnd.github+json',
      'X-GitHub-Api-Version':'2022-11-28'
    }, opts.headers||{});
    return fetch(API+path+(opts.method?'':'?ref='+BRANCH), opts);
  }
  async function getFile(path){
    var r=await gh(path);
    if(r.status===404) return null;
    if(!r.ok) throw new Error('read '+path+': HTTP '+r.status);
    return r.json();
  }
  async function putFile(path, base64, msg, sha){
    var body={ message: msg, content: base64, branch: BRANCH };
    if(sha) body.sha=sha;
    var r=await gh(path, { method:'PUT', body: JSON.stringify(body) });
    if(!r.ok){ var e=await r.text(); throw new Error('write '+path+': HTTP '+r.status+' '+e.slice(0,120)); }
    return r.json();
  }
  function b64utf8(s){ return btoa(unescape(encodeURIComponent(s))); }
  function fileToB64(file){
    return new Promise(function(res,rej){
      var r=new FileReader();
      r.onload=function(){ res(r.result.split(',')[1]); };
      r.onerror=rej; r.readAsDataURL(file);
    });
  }
  var slugify=function(s){ return s.toLowerCase().trim().replace(/[^\w֐-׿]+/g,'-').replace(/^-+|-+$/g,'') || 'item'; };

  // canvas helpers: returns {full<=1600 b64, thumb 480sq b64}
  function processImage(file, opts){
    opts=opts||{};
    return new Promise(function(res,rej){
      var img=new Image();
      img.onload=function(){
        function toB64(canvas){ return canvas.toDataURL('image/jpeg', .84).split(',')[1]; }
        var out={};
        if(!opts.squareOnly){
          var s=Math.min(1, 1600/Math.max(img.width,img.height));
          var c=document.createElement('canvas');
          c.width=Math.round(img.width*s); c.height=Math.round(img.height*s);
          c.getContext('2d').drawImage(img,0,0,c.width,c.height);
          out.full=toB64(c);
        }
        var side=opts.squareSize||480;
        var sq=document.createElement('canvas'); sq.width=side; sq.height=side;
        var m=Math.min(img.width,img.height);
        sq.getContext('2d').drawImage(img,(img.width-m)/2,(img.height-m)/2,m,m,0,0,side,side);
        out.thumb=toB64(sq);
        res(out);
      };
      img.onerror=function(){ rej(new Error('cannot read image')); };
      img.src=URL.createObjectURL(file);
    });
  }
  function mp3Duration(file){
    return new Promise(function(res){
      var a=new Audio();
      a.preload='metadata';
      a.onloadedmetadata=function(){ res(Math.round(a.duration)); URL.revokeObjectURL(a.src); };
      a.onerror=function(){ res(0); };
      a.src=URL.createObjectURL(file);
    });
  }
  async function updateJson(path, mutate, msg){
    var f=await getFile(path);
    var data=f ? JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\n/g,''))))) : null;
    var next=mutate(data);
    await putFile(path, b64utf8(JSON.stringify(next, null, 2)), msg, f && f.sha);
  }

  /* ---- beat ---- */
  $('goBeat').addEventListener('click', async function(){
    try{
      var f=$('beatFile').files[0], title=$('beatTitle').value.trim();
      if(!f||!title){ status('Need an mp3 and a title.'); return; }
      this.disabled=true;
      var slug=slugify(title);
      status('Reading duration...');
      var dur=await mp3Duration(f);
      status('Uploading mp3 (this can take a minute)...');
      await putFile(slug+'.mp3', await fileToB64(f), 'Beat: '+title);
      var coverPath=null;
      var cf=$('beatCover').files[0];
      if(cf){
        status('Uploading cover...');
        var im=await processImage(cf,{squareOnly:true,squareSize:600});
        coverPath='covers/'+slug+'.jpg';
        await putFile(coverPath, im.thumb, 'Cover: '+title);
      }
      status('Updating beats index...');
      await updateJson('content/beats/beats.json', function(d){
        d=d||{date:null,tracks:[]};
        d.date=new Date().toISOString().slice(0,10);
        d.tracks.unshift({title:title, file:slug+'.mp3', dur:dur, cover:coverPath});
        return d;
      }, 'Add beat to index: '+title);
      status('Done. "'+title+'" goes live in ~1 minute.');
      $('beatFile').value=''; $('beatTitle').value=''; $('beatCover').value='';
    }catch(e){ status('Error: '+e.message); }
    this.disabled=false;
  });

  /* ---- photos ---- */
  $('goPhoto').addEventListener('click', async function(){
    try{
      var files=[].slice.call($('photoFiles').files);
      if(!files.length){ status('Pick at least one photo.'); return; }
      this.disabled=true;
      var tags=$('photoTags').value.split(',').map(function(s){return s.trim();}).filter(Boolean);
      var loc=$('photoLoc').value.trim();
      var today=new Date().toISOString().slice(0,10);
      var entries=[];
      for(var i=0;i<files.length;i++){
        status('Processing photo '+(i+1)+'/'+files.length+'...');
        var name=slugify(files[i].name.replace(/\.[^.]+$/,''))+'-'+Date.now().toString(36)+(i?'-'+i:'')+'.jpg';
        var im=await processImage(files[i]);
        status('Uploading '+(i+1)+'/'+files.length+'...');
        await putFile('content/photos/img/'+name, im.full, 'Photo: '+name);
        await putFile('content/photos/img/thumb-'+name, im.thumb, 'Thumb: '+name);
        entries.push({file:name, tags:tags, loc:loc, alt:'', date:today});
      }
      status('Updating photo index...');
      await updateJson('content/photos/photos.json', function(d){
        return entries.concat(d||[]);
      }, 'Add '+entries.length+' photo(s)');
      status('Done. '+entries.length+' photo(s) go live in ~1 minute.');
      $('photoFiles').value=''; $('photoTags').value=''; $('photoLoc').value='';
    }catch(e){ status('Error: '+e.message); }
    this.disabled=false;
  });

  /* ---- note ---- */
  $('goNote').addEventListener('click', async function(){
    try{
      var title=$('noteTitle').value.trim(), body=$('noteBody').value.trim(), lang=$('noteLang').value;
      if(!title||!body){ status('Need a title and some text.'); return; }
      this.disabled=true;
      var slug=slugify(title), today=new Date().toISOString().slice(0,10);
      var imf=$('noteImg').files[0];
      if(imf){
        status('Uploading image...');
        var name=slug+'-'+Date.now().toString(36)+'.jpg';
        var im=await processImage(imf);
        await putFile('content/notes/img/'+name, im.full, 'Note image: '+name);
        body+='\n\n![](../img/'+name+')';
      }
      var md='---\ntitle: "'+title.replace(/"/g,'\\"')+'"\ndate: '+today+'\nlang: '+lang+'\npublish: true\n---\n\n'+body+'\n';
      status('Planting note...');
      await putFile('content/notes/'+slug+'.md', b64utf8(md), 'Note: '+title);
      status('Done. "'+title+'" goes live in ~1 minute.');
      $('noteTitle').value=''; $('noteBody').value=''; $('noteImg').value='';
    }catch(e){ status('Error: '+e.message); }
    this.disabled=false;
  });

  /* ---- covers ---- */
  var coverTarget=null;
  async function loadCovers(){
    status('Loading beats...');
    try{
      var f=await getFile('content/beats/beats.json');
      var data=JSON.parse(decodeURIComponent(escape(atob(f.content.replace(/\n/g,'')))));
      var ul=$('coverList'); ul.innerHTML='';
      data.tracks.forEach(function(t){
        var li=document.createElement('li');
        var thumbHtml = t.cover ? '<img src="{{PREFIX}}'+t.cover+'?'+Date.now()+'" alt="">' : 'no cover';
        li.innerHTML='<span class="thumb">'+thumbHtml+'</span><span class="t"></span><button>'+(t.cover?'Replace':'Add cover')+'</button>';
        li.querySelector('.t').textContent=t.title;
        li.querySelector('button').addEventListener('click',function(){
          coverTarget=t.title;
          $('coverPick').click();
        });
        ul.appendChild(li);
      });
      status('');
    }catch(e){ status('Error: '+e.message); }
  }
  $('coverPick').addEventListener('change', async function(){
    var f=this.files[0]; this.value='';
    if(!f||!coverTarget) return;
    try{
      status('Squaring + uploading cover for "'+coverTarget+'"...');
      var slug=slugify(coverTarget);
      var im=await processImage(f,{squareOnly:true,squareSize:600});
      var existing=await getFile('covers/'+slug+'.jpg');
      await putFile('covers/'+slug+'.jpg', im.thumb, 'Cover: '+coverTarget, existing&&existing.sha);
      await updateJson('content/beats/beats.json', function(d){
        d.tracks.forEach(function(t){ if(t.title===coverTarget) t.cover='covers/'+slug+'.jpg'; });
        return d;
      }, 'Set cover: '+coverTarget);
      status('Cover saved. Live in ~1 minute.');
      loadCovers();
    }catch(e){ status('Error: '+e.message); }
  });

  ui();
})();
</script>
</body>
</html>
